name: Deploy to DEV

on:
  push:
    branches:
      - develop
    paths:
      - 'migrations/**'

env:
  SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD_DEV }}
  SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
  SNOWFLAKE_DATABASE:  ${{ secrets.SNOWFLAKE_DATABASE_DEV }}
  SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}

jobs:

  # ─── JOB 1: Validate SQL files ───────────────────────────
  validate:
    name: Validate SQL Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install snowflake-connector-python schemachange

      - name: Check migration file naming convention
        run: |
          echo "Checking migration files follow VX.X.X__description.sql format..."
          for file in migrations/*.sql; do
            filename=$(basename "$file")
            if ! echo "$filename" | grep -qE '^V[0-9]+\.[0-9]+\.[0-9]+__[a-z0-9_]+\.sql$'; then
              echo "FAIL: Invalid filename format: $filename"
              echo "Expected format: V1.0.0__create_tables.sql"
              exit 1
            fi
          done
          echo "All migration files follow correct naming convention"

      - name: Check for duplicate versions
        run: |
          echo "Checking for duplicate version numbers..."
          python3 << 'EOF'
          import os, sys, re
          files = os.listdir('migrations')
          versions = []
          for f in files:
              match = re.match(r'^V(\d+\.\d+\.\d+)__', f)
              if match:
                  v = match.group(1)
                  if v in versions:
                      print(f"FAIL: Duplicate version {v} found in {f}")
                      sys.exit(1)
                  versions.append(v)
          print(f"OK: {len(versions)} unique versions found")
          EOF

  # ─── JOB 2: Deploy to DEV ────────────────────────────────
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: validate
    environment: dev

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SchemaChange
        run: pip install schemachange snowflake-connector-python

      - name: Run SchemaChange — Deploy Migrations
        run: |
          schemachange \
            --snowflake-account   $SNOWFLAKE_ACCOUNT \
            --snowflake-user      $SNOWFLAKE_USER \
            --snowflake-password  $SNOWFLAKE_PASSWORD \
            --snowflake-warehouse $SNOWFLAKE_WAREHOUSE \
            --snowflake-database  $SNOWFLAKE_DATABASE \
            --snowflake-role      $SNOWFLAKE_ROLE \
            --snowflake-schema    PUBLIC \
            --change-history-table SCHEMACHANGE.CHANGE_HISTORY \
            --root-folder         migrations/ \
            --verbose

      - name: Run Validation Tests
        run: |
          python3 << 'EOF'
          import snowflake.connector
          import os

          conn = snowflake.connector.connect(
              account   = os.environ['SNOWFLAKE_ACCOUNT'],
              user      = os.environ['SNOWFLAKE_USER'],
              password  = os.environ['SNOWFLAKE_PASSWORD'],
              warehouse = os.environ['SNOWFLAKE_WAREHOUSE'],
              database  = os.environ['SNOWFLAKE_DATABASE'],
              role      = os.environ['SNOWFLAKE_ROLE']
          )

          with open('tests/validate_pipeline.sql', 'r') as f:
              sql = f.read()

          cursor = conn.cursor()
          failures = []

          for statement in sql.split(';'):
              statement = statement.strip()
              if not statement or statement.startswith('--'):
                  continue
              try:
                  cursor.execute(statement)
                  rows = cursor.fetchall()
                  if rows:
                      for row in rows:
                          if 'FAIL' in str(row[0]):
                              failures.append(str(row))
              except Exception as e:
                  print(f"Warning: {e}")

          cursor.close()
          conn.close()

          if failures:
              print("VALIDATION FAILED:")
              for f in failures:
                  print(f)
              exit(1)
          else:
              print("All validation tests passed")
          EOF

      - name: Print DEV Deploy Summary
        run: |
          echo "==============================="
          echo "DEV Deployment Complete"
          echo "Database : $SNOWFLAKE_DATABASE"
          echo "Branch   : ${{ github.ref_name }}"
          echo "Commit   : ${{ github.sha }}"
          echo "==============================="
