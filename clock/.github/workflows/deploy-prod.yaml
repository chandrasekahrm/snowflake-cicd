name: Deploy to PROD

on:
  workflow_dispatch:      # manual trigger only for PROD
    inputs:
      confirm_prod:
        description: 'Type DEPLOY to confirm PROD deployment'
        required: true
        default: ''

env:
  SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD_PROD }}
  SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
  SNOWFLAKE_DATABASE:  ${{ secrets.SNOWFLAKE_DATABASE_PROD }}
  SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}

jobs:

  # ─── Safety Check ─────────────────────────────────────────
  safety-check:
    name: Safety Check
    runs-on: ubuntu-latest
    steps:
      - name: Confirm PROD deployment
        run: |
          if [ "${{ github.event.inputs.confirm_prod }}" != "DEPLOY" ]; then
            echo "FAIL: You must type DEPLOY to confirm production deployment"
            exit 1
          fi
          echo "Confirmation received. Proceeding to PROD deployment."

  # ─── Deploy to PROD (Manual Approval Required) ───────────
  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: safety-check
    environment:
      name: prod          # environment protection rule = manual approval
      url: https://app.snowflake.com

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SchemaChange
        run: pip install schemachange snowflake-connector-python

      - name: Run SchemaChange — Deploy to PROD
        run: |
          schemachange \
            --snowflake-account   $SNOWFLAKE_ACCOUNT \
            --snowflake-user      $SNOWFLAKE_USER \
            --snowflake-password  $SNOWFLAKE_PASSWORD \
            --snowflake-warehouse $SNOWFLAKE_WAREHOUSE \
            --snowflake-database  $SNOWFLAKE_DATABASE \
            --snowflake-role      $SNOWFLAKE_ROLE \
            --snowflake-schema    PUBLIC \
            --change-history-table SCHEMACHANGE.CHANGE_HISTORY \
            --root-folder         migrations/ \
            --verbose

      - name: Run Validation Tests on PROD
        run: |
          python3 << 'EOF'
          import snowflake.connector
          import os

          conn = snowflake.connector.connect(
              account   = os.environ['SNOWFLAKE_ACCOUNT'],
              user      = os.environ['SNOWFLAKE_USER'],
              password  = os.environ['SNOWFLAKE_PASSWORD'],
              warehouse = os.environ['SNOWFLAKE_WAREHOUSE'],
              database  = os.environ['SNOWFLAKE_DATABASE'],
              role      = os.environ['SNOWFLAKE_ROLE']
          )

          with open('tests/validate_pipeline.sql', 'r') as f:
              sql = f.read()

          cursor = conn.cursor()
          failures = []

          for statement in sql.split(';'):
              statement = statement.strip()
              if not statement or statement.startswith('--'):
                  continue
              try:
                  cursor.execute(statement)
                  rows = cursor.fetchall()
                  if rows:
                      for row in rows:
                          if 'FAIL' in str(row[0]):
                              failures.append(str(row))
              except Exception as e:
                  print(f"Warning: {e}")

          cursor.close()
          conn.close()

          if failures:
              print("PROD VALIDATION FAILED:")
              for f in failures:
                  print(f)
              exit(1)
          else:
              print("All PROD validation tests passed")
          EOF

      - name: Print PROD Deploy Summary
        run: |
          echo "======================================="
          echo "PROD Deployment Complete"
          echo "Database  : $SNOWFLAKE_DATABASE"
          echo "Triggered : ${{ github.actor }}"
          echo "Commit    : ${{ github.sha }}"
          echo "======================================="
